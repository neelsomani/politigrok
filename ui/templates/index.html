<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ page_description }}" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PolitiGrok" />
    <meta property="og:title" content="{{ page_title }}" />
    <meta property="og:description" content="{{ page_description }}" />
    <meta property="og:url" content="{{ canonical_url }}" />
    <meta property="og:image" content="{{ og_image_url }}" />
    <meta property="og:image:alt" content="PolitiGrok social preview card" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ page_title }}" />
    <meta name="twitter:description" content="{{ page_description }}" />
    <meta name="twitter:image" content="{{ og_image_url }}" />
    <meta name="twitter:image:alt" content="PolitiGrok social preview card" />
    <link rel="canonical" href="{{ canonical_url }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header>
      <div class="header-top">
        <h1>PolitiGrok Fact Checks</h1>
        <a
          class="github-link"
          href="https://github.com/neelsomani/politigrok"
          aria-label="GitHub repository"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
            <path
              d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.01.08-2.1 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.09.16 1.9.08 2.1.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
            ></path>
          </svg>
        </a>
      </div>
      <div class="controls">
        <input id="search" type="text" placeholder="Search claim text..." />
        <button id="refresh">Refresh</button>
      </div>
    </header>

    <main>
      <div id="status">Loading fact checks...</div>
      <div id="cards" class="cards"></div>
      <div class="footer-actions">
        <button id="load-more" class="hidden">Load more</button>
      </div>
    </main>

    <template id="card-template">
      <article class="card">
        <div class="card-top">
          <h2 class="claim"></h2>
          <div class="card-actions">
            <button class="copy-link-btn" type="button">Copy link</button>
            <a class="source-link" target="_blank" rel="noopener noreferrer">Open source</a>
          </div>
        </div>
        <div class="meta"></div>
        <section class="compare-grid">
          <div>
            <h3>PolitiFact</h3>
            <div class="politifact-verdict"></div>
            <pre class="politifact-text"></pre>
          </div>
          <div>
            <h3 class="grok-title">Grok</h3>
            <div class="grok-verdict"></div>
            <pre class="grok-text"></pre>
          </div>
        </section>
      </article>
    </template>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
  </html>
